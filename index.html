<!DOCTYPE html>
<html>
<head>
  <title>Frequent Creations</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      display: flex;
    }

    /* Sidebar */
    .sidebar {
      width: 220px;
      background: #0f172a;
      color: white;
      height: 100vh;
      padding: 20px;
    }

    .sidebar h2 {
      margin-bottom: 20px;
    }

    .sidebar a {
      display: block;
      color: white;
      padding: 10px;
      text-decoration: none;
    }

    .sidebar a:hover {
      background: #1d4ed8;
    }

    /* Main */
    .main {
      flex: 1;
      padding: 20px;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .cart {
      background: #1d4ed8;
      color: white;
      padding: 10px 15px;
      border-radius: 10px;
    }

    /* Banner */
    .banner {
      background: #1d4ed8;
      color: white;
      padding: 40px;
      margin-top: 20px;
      border-radius: 15px;
      text-align: center;
    }

    /* Products */
    .products {
      display: flex;
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      border: 1px solid #ddd;
      padding: 15px;
      width: 200px;
      border-radius: 10px;
      text-align: center;
    }

    .card button {
      margin-top: 10px;
      padding: 10px;
      background: #1d4ed8;
      color: white;
      border: none;
      border-radius: 5px;
    }

  </style>
</head>

<body>

<div class="sidebar">
  <h2>Categories</h2>
  <a href="#">Sports</a>
  <a href="#">Faith</a>
  <a href="#">Lifestyle</a>
  <a href="#">Custom Orders</a>
  <a href="#">Merchandise</a>
</div>

<div class="main">

  <div class="header">
    <h1>Frequent Creations</h1>
    <div class="cart">Cart: <span id="cart-count">0</span></div>
  </div>

  <div class="banner">
    <h2>Bringing Images To Life</h2>
    <p>Create your own custom apparel today</p>
  </div>

  <div class="products">

    <div class="card">
  <img src="PASTE-YOUR-RAW-LINK-HERE" style="width:100%; border-radius:10px;">
  <h3>Sports Shirt</h3>
  <p>$25 (S–XL)<br>$30 (2X–5X)</p>
  <button onclick="addToCart()">Add</button>
      </div>
    </div>

    <div class="card">
      <img src="PASTE-FAITH-RAW-LINK-HERE" style="width:100%; border-radius:10px;">
    <h3>Faith Shirt</h3>
    <p>$25 (S-XL)<br>$30 (2X-5X)</p>
    <button onclick="addToCart()">Add</button>
  </div>

    </div>

    <div class="card">
      <img src="PASTE-LIFESTYLE-RAW-LINK-HERE" style="width:100%; border-radius:10px;">
    <h3>Lifestyle Shirt</h3>
    <p>$25 (S-XL)<br>$30 (2X-5X)</p>
    <button onclick="addToCart()">Add</button>
  </div>

    </div>

  </div>

</div>

<script>
let count = 0;

function addToCart() {
  count++;
  document.getElementById("cart-count").innerText = count;
}
</script>

</body>
</html>
